name: Daily Historical Figure

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

concurrency:
  group: daily-historical-figure-main
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run historical figure generator
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WIKIMEDIA_CONTACT: https://github.com/${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_NINJAS_API_KEY: ${{ secrets.API_NINJAS_API_KEY }}
        run: python historical_figures.py

      - name: Inspect generated files
        run: |
          echo "Generated output files:"
          find output/historical_figure -maxdepth 4 -type f | sort || true
          echo "Generated asset files:"
          find assets/generated/historical_figure -maxdepth 4 -type f | sort || true
          echo "Git status before commit:"
          git status --short

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/historical_figure assets/generated/historical_figure
          if git diff --staged --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "auto-generate historical figure"

          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} to ${branch}"
            if git pull --rebase origin "${branch}" && git push origin "HEAD:${branch}"; then
              echo "Push succeeded."
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done

          echo "Failed to push after retries."
          exit 1
