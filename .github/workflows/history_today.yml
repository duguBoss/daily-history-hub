name: 📜 History Today Scraper

on:
  schedule:
    # 每天早上 7:30 (北京时间) 运行。GitHub Action 的 Cron 用的是 UTC 时间，所以减去 8 小时就是 23:30
    - cron: '30 23 * * *'
  workflow_dispatch: # 允许你在网页端手动点击按钮运行测试

jobs:
  scrape-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予写入仓库的权限，否则无法自动提交图片
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run History Scraper
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python history_today.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate: 历史上的今天 📜"
          file_pattern: 'assets/history/* *.json'
