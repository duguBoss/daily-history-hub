name: Daily History Today

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

concurrency:
  group: daily-history-today-main
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WIKIMEDIA_CONTACT: https://github.com/${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          API_NINJAS_API_KEY: ${{ secrets.API_NINJAS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_RESPONSE_FORMAT: "base64"
          MINIMAX_REQUEST_TIMEOUT_SECONDS: "120"
          MINIMAX_DOWNLOAD_TIMEOUT_SECONDS: "60"
          IMAGE_GENERATION_BUDGET_SECONDS: "300"
        run: python history_today.py --output-dir output

      - name: Inspect generated files
        run: |
          echo "Generated output files:"
          find output -maxdepth 2 -type f | sort || true
          echo "Generated asset files:"
          find assets/generated -maxdepth 4 -type f | sort || true
          echo "Git status before commit:"
          git status --short

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output assets/generated
          if git diff --staged --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git commit -m "auto-generate history today"

          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            echo "Push attempt ${attempt} to ${branch}"
            if git pull --rebase origin "${branch}" && git push origin "HEAD:${branch}"; then
              echo "Push succeeded."
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done

          echo "Failed to push after retries."
          exit 1
