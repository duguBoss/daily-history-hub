name: Daily History Today

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          WIKIMEDIA_CONTACT: https://github.com/${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          API_NINJAS_API_KEY: ${{ secrets.API_NINJAS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python history_today.py --output-dir output

      - name: Inspect generated files
        run: |
          echo "Generated output files:"
          find output -maxdepth 2 -type f | sort || true
          echo "Generated asset files:"
          find assets/generated -maxdepth 4 -type f | sort || true
          echo "Git status before commit:"
          git status --short

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add outputs/ history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily music and history" && git push)
