name: Daily History Today

on:
  schedule:
    - cron: '10 16 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          WIKIMEDIA_CONTACT: https://github.com/${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          API_NINJAS_API_KEY: ${{ secrets.API_NINJAS_API_KEY }}
        run: python history_today.py --output-dir output

      - name: Commit generated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto-generate history today" && git push)
